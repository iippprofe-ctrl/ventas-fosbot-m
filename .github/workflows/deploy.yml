name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://script.google.com/macros/s/AKfycbw9hsnnInJgV8adCLvfhfRX3tEvaiYBOEUYq_xu58YfA-MbdYTLPk7UXcvYcQqx3Bbk/exec
          VITE_API_TOKEN: FISBOT_SECURITY_TOKEN_123

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
